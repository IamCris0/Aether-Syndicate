# Despliegue en Render (https://render.com) — Blueprint de UN solo servicio:
# el servidor Node sirve el cliente compilado y el Socket.IO en la misma URL.
# Pasos: sube el repo a GitHub → Render → New → Blueprint → selecciona el repo.
services:
  - type: web
    name: aether-syndicate
    runtime: node
    plan: free
    # us-east: la mejor latencia media para LATAM/España (el default de
    # Render es Oregon, que añade ~80-120 ms). Cambiar región requiere
    # RECREAR el servicio: borra el actual y vuelve a aplicar el Blueprint.
    region: ohio
    buildCommand: npm install && npm run build -w @aether/client
    startCommand: npm run start -w @aether/server
    healthCheckPath: /health
    envVars:
      # El servidor sirve el build del cliente (ruta relativa a packages/server).
      - key: CLIENT_DIST
        value: ../client/dist
      - key: AETHER_REGION
        value: render
      # Claves PUBLICABLES de Supabase (necesarias en tiempo de build del cliente).
      - key: VITE_SUPABASE_URL
        value: https://dedoiaptbvknnfidqrko.supabase.co
      - key: VITE_SUPABASE_ANON_KEY
